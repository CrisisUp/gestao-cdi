services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao-cdi-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # Removido os volumes individuais redundantes que podem causar erro no Windows
      # (Se o arquivo database.sqlite não existir no host, o Docker o cria como pasta)
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - cdi-network

networks:
  cdi-network:
    driver: bridge
